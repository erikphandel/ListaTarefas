name: Pipeline CI/CD
on:
  push:
    branches:
      - main
    paths:
      - "lista-tarefas-testes/app/**"
      - ".github/workflows/**"
  pull_request: 
    branches:
      - main
  workflow_dispatch: 
  
jobs:
  # Clean install e testes
  build-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lista-tarefas-testes
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6
      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: ./lista-tarefas-testes/package-lock.json
      - name: Instalação de dependências
        run: npm ci
      - name: Rodar testes
        run: npm run test -- --watch=false
      - name: Rodar o build
        run: npm run build
  # Deploy no Vercel      
  deploy:
    needs: build-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lista-tarefas-testes
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: ./lista-tarefas-testes/package-lock.json
      - name: Instalação de dependências
        run: npm install -g vercel@latest
      - name: Deploy no Vercel
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --cwd=.
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
 
