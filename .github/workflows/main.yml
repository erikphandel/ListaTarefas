name: Pipeline CI/CD
on:
  push:
    branches:
      - main
    paths:
      - "lista-tarefas-teste/app/**"
      - ".github/workflows/**"
  pull_request: 
    branches:
      - main
  workflow_dispatch: 
  
jobs:
  # Build
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lista-tarefas-testes
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6
      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Instalação de dependências
        run: npm install
      - name: Rodar o build
        run: npm run build

  tests:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./lista-tarefas-testes
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6
      - name: Instalação do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Instalação de dependências
        run: npm install
      - name: Rodar o lint
        run: npm run lint
      - name: Verificar formatação
        run:  npm run format -- -- check
      - name: Rodar testes
        run: npm run test

